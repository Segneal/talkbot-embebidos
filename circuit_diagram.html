<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Talkbot - Diagrama de Circuito</title>
<style>
  body { margin: 0; padding: 20px; background: #fff; font-family: 'Segoe UI', sans-serif; }
  h1 { text-align: center; font-size: 20px; color: #222; margin-bottom: 2px; }

<body>
<h1>Talkbot - Diagrama de Circuito</h1>
<p class="sub">ESP32 DevKit v1 &bull; MAX9814 &bull; PAM8403 &bull; ST7789 &bull; 4 botones</p>

<svg viewBox="0 0 1000 750" width="1000" height="750" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, sans-serif">

  <!-- ============================================================ -->
  <!-- DEFINITIONS                                                   -->
  <!-- ============================================================ -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#666"/>

  </defs>

  <!-- ============================================================ -->
  <!-- ESP32 (center)                                                -->
  <!-- ============================================================ -->
  <rect x="350" y="200" width="280" height="200" rx="10" fill="#f0f6ff" stroke="#1565c0" stroke-width="2.5"/>
  <text x="490" y="228" text-anchor="middle" font-size="17" font-weight="700" fill="#1565c0">ESP32 DevKit v1</text>
  <text x="490" y="248" text-anchor="middle" font-size="10" fill="#888">Dual-core Xtensa LX6 @ 240 MHz</text>
  <text x="490" y="262" text-anchor="middle" font-size="10" fill="#888">WiFi 802.11 · ADC · DAC · SPI</text>

  <!-- ESP32 Left pins -->
  <text x="360" y="295" font-size="9.5" font-family="Consolas" fill="#2e7d32">GPIO34 (ADC) ◄──</text>
  <text x="360" y="315" font-size="9.5" font-family="Consolas" fill="#ef6c00">GPIO27 (PTT) ◄──</text>
  <text x="360" y="335" font-size="9.5" font-family="Consolas" fill="#ef6c00">GPIO32 (V+)  ◄──</text>
  <text x="360" y="355" font-size="9.5" font-family="Consolas" fill="#ef6c00">GPIO33 (V-)  ◄──</text>
  <text x="360" y="375" font-size="9.5" font-family="Consolas" fill="#ef6c00">GPIO13 (Scr) ◄──</text>

  <!-- ESP32 Right pins -->
  <text x="530" y="295" font-size="9.5" font-family="Consolas" fill="#7b1fa2">──► GPIO25 (DAC1)</text>
  <text x="530" y="320" font-size="9.5" font-family="Consolas" fill="#0277bd">──► GPIO23 (MOSI)</text>
  <text x="530" y="336" font-size="9.5" font-family="Consolas" fill="#0277bd">──► GPIO18 (SCK)</text>
  <text x="530" y="352" font-size="9.5" font-family="Consolas" fill="#0277bd">──► GPIO2  (DC)</text>
  <text x="530" y="368" font-size="9.5" font-family="Consolas" fill="#0277bd">──► GPIO4  (RST)</text>
  <text x="530" y="384" font-size="9.5" font-family="Consolas" fill="#0277bd">──► GPIO15 (BLK)</text>

  <!-- ============================================================ -->
  <!-- MAX9814 (left top)                                            -->
  <!-- ============================================================ -->

  <text x="125" y="270" text-anchor="middle" font-size="14" font-weight="700" fill="#2e7d32">MAX9814</text>
  <text x="125" y="286" text-anchor="middle" font-size="10" fill="#777">Micrófono con AGC</text>
  <text x="125" y="302" text-anchor="middle" font-size="9" font-family="Consolas" fill="#2e7d32">VDD · GND · OUT</text>

  <!-- Wire: MAX9814 OUT → ESP32 GPIO34 -->
  <line x1="200" y1="290" x2="350" y2="290" stroke="#2e7d32" stroke-width="2.5"/>
  <circle cx="200" cy="290" r="3" fill="#2e7d32"/>
  <circle cx="350" cy="290" r="3" fill="#2e7d32"/>

  <!-- Wire: 3.3V → MAX9814 -->
  <line x1="200" y1="258" x2="240" y2="258" stroke="#e65100" stroke-width="1.5"/>
  <line x1="240" y1="258" x2="240" y2="210" stroke="#e65100" stroke-width="1.5"/>
  <line x1="240" y1="210" x2="370" y2="210" stroke="#e65100" stroke-width="1.5"/>
  <circle cx="200" cy="258" r="2.5" fill="#e65100"/>
  <text x="245" y="224" font-size="9" fill="#e65100" font-weight="600">3.3V</text>

  <line x1="230" y1="308" x2="230" y2="340" stroke="#999" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="215" y="352" font-size="8" fill="#999">GND</text>

  <!-- BUTTONS (left bottom)                                         -->
  <!-- ============================================================ -->

  <text x="135" y="425" text-anchor="middle" font-size="11" font-weight="700" fill="#ef6c00">Botón PTT</text>

  <line x1="200" y1="428" x2="350" y2="311" stroke="#ef6c00" stroke-width="2"/>
  <circle cx="200" cy="428" r="3" fill="#ef6c00"/>
  <circle cx="350" cy="311" r="3" fill="#ef6c00"/>

  <!-- Vol+ -->
  <rect x="70" y="456" width="130" height="36" rx="6" fill="#fff8f0" stroke="#ef6c00" stroke-width="2"/>
  <text x="135" y="471" text-anchor="middle" font-size="11" font-weight="700" fill="#ef6c00">Botón Vol+</text>
  <text x="135" y="485" text-anchor="middle" font-size="9" fill="#999">Volumen +10%</text>
  <line x1="200" y1="474" x2="350" y2="331" stroke="#ef6c00" stroke-width="2"/>
  <circle cx="200" cy="474" r="3" fill="#ef6c00"/>
  <circle cx="350" cy="331" r="3" fill="#ef6c00"/>

  <rect x="70" y="502" width="130" height="36" rx="6" fill="#fff8f0" stroke="#ef6c00" stroke-width="2"/>
  <text x="135" y="517" text-anchor="middle" font-size="11" font-weight="700" fill="#ef6c00">Botón Vol−</text>
  <text x="135" y="531" text-anchor="middle" font-size="9" fill="#999">Volumen −10%</text>
  <line x1="200" y1="520" x2="350" y2="351" stroke="#ef6c00" stroke-width="2"/>
  <circle cx="200" cy="520" r="3" fill="#ef6c00"/>
  <circle cx="350" cy="351" r="3" fill="#ef6c00"/>

  <rect x="70" y="548" width="130" height="36" rx="6" fill="#fff8f0" stroke="#ef6c00" stroke-width="2"/>
  <text x="135" y="563" text-anchor="middle" font-size="11" font-weight="700" fill="#ef6c00">Botón Pantalla</text>
  <text x="135" y="577" text-anchor="middle" font-size="9" fill="#999">Navegar screens</text>
  <line x1="200" y1="566" x2="350" y2="371" stroke="#ef6c00" stroke-width="2"/>
  <circle cx="200" cy="566" r="3" fill="#ef6c00"/>
  <circle cx="350" cy="371" r="3" fill="#ef6c00"/>

  <line x1="70" y1="446" x2="55" y2="446" stroke="#999" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="70" y1="492" x2="55" y2="492" stroke="#999" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="70" y1="538" x2="55" y2="538" stroke="#999" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- DAC OUTPUT PATH: ESP32 → R 10KΩ → PAM8403 → Parlante         -->
  <!-- ============================================================ -->

  <!-- Wire: ESP32 GPIO25 → junction point -->
  <line x1="630" y1="290" x2="700" y2="290" stroke="#7b1fa2" stroke-width="2.5"/>
  <circle cx="630" cy="290" r="3" fill="#7b1fa2"/>
  <circle cx="700" cy="290" r="4" fill="#7b1fa2"/>

  <!-- Junction → down to Resistor 10KΩ -->
  <line x1="700" y1="290" x2="700" y2="330" stroke="#795548" stroke-width="2"/>
  <rect x="685" y="330" width="30" height="44" rx="4" fill="#faf5f0" stroke="#795548" stroke-width="1.5"/>
  <text x="700" y="348" text-anchor="middle" font-size="9" font-weight="700" fill="#795548">10K</text>
  <text x="700" y="362" text-anchor="middle" font-size="8" fill="#795548">Ω</text>
  <line x1="700" y1="374" x2="700" y2="395" stroke="#999" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="710" y="392" font-size="8" fill="#999">GND</text>

  <line x1="690" y1="395" x2="710" y2="395" stroke="#999" stroke-width="2"/>
  <line x1="693" y1="400" x2="707" y2="400" stroke="#999" stroke-width="1.5"/>
  <line x1="696" y1="405" x2="704" y2="405" stroke="#999" stroke-width="1"/>

  <circle cx="770" cy="290" r="3" fill="#7b1fa2"/>

  <rect x="770" y="250" width="120" height="85" rx="8" fill="#f8f0ff" stroke="#7b1fa2" stroke-width="2"/>
  <text x="830" y="275" text-anchor="middle" font-size="14" font-weight="700" fill="#7b1fa2">PAM8403</text>
  <text x="830" y="291" text-anchor="middle" font-size="10" fill="#777">Amplificador</text>
  <text x="830" y="305" text-anchor="middle" font-size="10" fill="#777">Clase D · 3W</text>
  <text x="830" y="322" text-anchor="middle" font-size="9" font-family="Consolas" fill="#7b1fa2">IN · VCC · GND · OUT</text>

  <!-- PAM8403 → Speaker -->
  <line x1="890" y1="290" x2="920" y2="290" stroke="#c62828" stroke-width="2.5"/>
  <circle cx="890" cy="290" r="3" fill="#c62828"/>
  <circle cx="920" cy="290" r="3" fill="#c62828"/>

  <!-- Speaker -->
  <rect x="920" y="265" width="60" height="50" rx="8" fill="#fff5f5" stroke="#c62828" stroke-width="2"/>
  <text x="950" y="286" text-anchor="middle" font-size="20">&#128266;</text>
  <text x="950" y="305" text-anchor="middle" font-size="10" font-weight="600" fill="#c62828">8Ω</text>

  <!-- Portapilas → PAM8403 (VCC) -->
  <rect x="790" y="140" width="80" height="55" rx="8" fill="#fff8f0" stroke="#e65100" stroke-width="2"/>

  <line x1="830" y1="195" x2="830" y2="250" stroke="#e65100" stroke-width="2"/>
  <circle cx="830" cy="195" r="3" fill="#e65100"/>
  <circle cx="830" cy="250" r="3" fill="#e65100"/>
  <text x="838" y="228" font-size="9" fill="#e65100" font-weight="600">3V</text>

  <!-- PAM8403 GND -->
  <line x1="830" y1="335" x2="830" y2="355" stroke="#999" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="820" y1="355" x2="840" y2="355" stroke="#999" stroke-width="2"/>
  <line x1="823" y1="360" x2="837" y2="360" stroke="#999" stroke-width="1.5"/>
  <line x1="826" y1="365" x2="834" y2="365" stroke="#999" stroke-width="1"/>

  <!-- ============================================================ -->
  <!-- ST7789 DISPLAY (right bottom)                                 -->
  <!-- ============================================================ -->
  <rect x="770" y="440" width="140" height="95" rx="8" fill="#f0f8ff" stroke="#0277bd" stroke-width="2"/>

  <text x="840" y="515" text-anchor="middle" font-size="9" font-family="Consolas" fill="#0277bd">MOSI·SCK·DC·RST·BLK</text>
  <text x="840" y="527" text-anchor="middle" font-size="9" font-family="Consolas" fill="#0277bd">VCC · GND</text>

  <!-- SPI wires: ESP32 right → ST7789 left -->
  <line x1="630" y1="316" x2="660" y2="316" stroke="#0277bd" stroke-width="2"/>
  <line x1="660" y1="316" x2="660" y2="460" stroke="#0277bd" stroke-width="2"/>
  <line x1="660" y1="460" x2="770" y2="460" stroke="#0277bd" stroke-width="2"/>
  <circle cx="630" cy="316" r="3" fill="#0277bd"/>
  <circle cx="770" cy="460" r="3" fill="#0277bd"/>
  <text x="668" y="456" font-size="8" fill="#0277bd">MOSI</text>

  <line x1="630" y1="332" x2="648" y2="332" stroke="#0277bd" stroke-width="2"/>
  <line x1="648" y1="332" x2="648" y2="473" stroke="#0277bd" stroke-width="2"/>
  <line x1="648" y1="473" x2="770" y2="473" stroke="#0277bd" stroke-width="2"/>
  <circle cx="630" cy="332" r="3" fill="#0277bd"/>
  <circle cx="770" cy="473" r="3" fill="#0277bd"/>
  <text x="668" y="470" font-size="8" fill="#0277bd">SCK</text>

  <line x1="630" y1="348" x2="636" y2="348" stroke="#0277bd" stroke-width="2"/>

  <circle cx="770" cy="486" r="3" fill="#0277bd"/>

  <line x1="630" y1="364" x2="624" y2="364" stroke="#0277bd" stroke-width="2"/>

  <line x1="624" y1="499" x2="770" y2="499" stroke="#0277bd" stroke-width="2"/>
  <circle cx="630" cy="364" r="3" fill="#0277bd"/>
  <circle cx="770" cy="499" r="3" fill="#0277bd"/>
  <text x="668" y="496" font-size="8" fill="#0277bd">RST</text>

  <line x1="630" y1="380" x2="612" y2="380" stroke="#0277bd" stroke-width="2"/>
  <line x1="612" y1="380" x2="612" y2="512" stroke="#0277bd" stroke-width="2"/>
  <line x1="612" y1="512" x2="770" y2="512" stroke="#0277bd" stroke-width="2"/>

  <circle cx="770" cy="512" r="3" fill="#0277bd"/>

  <!-- TFT 3.3V -->
  <line x1="770" y1="448" x2="740" y2="448" stroke="#e65100" stroke-width="1.5"/>
  <line x1="740" y1="448" x2="740" y2="210" stroke="#e65100" stroke-width="1.5"/>

  <line x1="910" y1="488" x2="930" y2="488" stroke="#999" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="930" y1="488" x2="930" y2="510" stroke="#999" stroke-width="1.5" stroke-dasharray="4 3"/>

  <line x1="926" y1="520" x2="934" y2="520" stroke="#999" stroke-width="1"/>

  <!-- ============================================================ -->

  <rect x="380" y="620" width="220" height="60" rx="8" fill="#f0fffe" stroke="#00838f" stroke-width="2" stroke-dasharray="6 3"/>
  <text x="490" y="644" text-anchor="middle" font-size="13" font-weight="700" fill="#00838f">Backend (PC)</text>

  <rect x="770" y="590" width="170" height="145" rx="6" fill="#fff" stroke="#ddd" stroke-width="1"/>

  <line x1="785" y1="623" x2="815" y2="623" stroke="#e65100" stroke-width="2.5"/>

  <line x1="785" y1="641" x2="815" y2="641" stroke="#999" stroke-width="2" stroke-dasharray="4 3"/>

  <line x1="785" y1="731" x2="815" y2="731" stroke="#00838f" stroke-width="2" stroke-dasharray="8 4"/>
